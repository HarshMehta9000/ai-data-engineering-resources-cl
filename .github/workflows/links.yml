name: Link Check
on:
  push:
    branches: [main]
    paths:
      - '**.md'
      - '.github/workflows/links.yml'
      - '.lycheeignore'
  pull_request:
    paths:
      - '**.md'
  schedule:
    # Weekly on Sunday at 06:00 UTC
    - cron: '0 6 * * 0'
  workflow_dispatch:
jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-
      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          # Check all markdown files; respect .lycheeignore
          args: >-
            --cache
            --max-cache-age 1d
            --no-progress
            --accept 200,206,429
            './**/*.md'
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
